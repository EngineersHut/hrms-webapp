<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRMS Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #090d16;
      --card-bg: rgba(17, 25, 40, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary: #10b981; /* Emerald */
      --secondary: #06b6d4; /* Cyan */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Ambient background glow */
    .glow-bg {
      position: absolute;
      top: -50%;
      left: -50%;
      right: -50%;
      bottom: -50%;
      background: radial-gradient(circle at 30% 30%, rgba(16, 185, 129, 0.12) 0%, transparent 40%),
                  radial-gradient(circle at 70% 70%, rgba(6, 182, 212, 0.12) 0%, transparent 40%);
      z-index: 1;
      filter: blur(80px);
      animation: drift 15s ease-in-out infinite alternate;
    }

    @keyframes drift {
      0% { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(5deg) scale(1.05); }
    }

    /* Splash card styling (glassmorphism) */
    .splash-card {
      position: relative;
      z-index: 2;
      width: 460px;
      height: 310px;
      background: var(--card-bg);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    /* Header with Logo and Brand */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-container {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
      position: relative;
      overflow: hidden;
    }

    .logo-container::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: rotate(45deg);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .logo-svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: white;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: linear-gradient(135deg, #ffffff 30%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-subtitle {
      font-size: 11px;
      font-weight: 600;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    /* Center section - Status information */
    .status-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
      margin-bottom: 12px;
    }

    .status-text {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      height: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: pulseText 1.5s infinite ease-in-out;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.5; }
    }

    /* Footer - Animated progress bar */
    .progress-bar-container {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      box-shadow: 0 0 8px var(--primary);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Indeterminate state loader fallback */
    .progress-indeterminate {
      position: absolute;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      width: 40%;
      border-radius: 2px;
      box-shadow: 0 0 8px var(--primary);
      animation: progress-slide 1.6s infinite ease-in-out;
    }

    @keyframes progress-slide {
      0% { left: -40%; }
      100% { left: 100%; }
    }

    .footer-version {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
      text-align: right;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="glow-bg"></div>

  <div class="splash-card">
    <div class="header">
      <div class="logo-container">
        <!-- SVG HRMS Node Logo -->
        <svg class="logo-svg" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </div>
      <div>
        <h1 class="brand-title">EH Workspace</h1>
        <div class="brand-subtitle">HRMS Desktop Portal</div>
      </div>
    </div>

    <div>
      <div class="status-container">
        <div id="status" class="status-text">Initializing components...</div>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar-fill"></div>
          <div id="progress-loading" class="progress-indeterminate"></div>
        </div>
      </div>
      <div id="version" class="footer-version">v1.0.0</div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const progressBar = document.getElementById('progress-bar');
    const progressLoading = document.getElementById('progress-loading');
    const versionEl = document.getElementById('version');

    // Load initial app version
    if (window.electronAPI && window.electronAPI.getAppVersion) {
      window.electronAPI.getAppVersion().then(version => {
        versionEl.innerText = `v${version}`;
      });

      // Listen for updates from main process
      window.electronAPI.onUpdateStatus((status) => {
        statusEl.innerText = status;
        
        // Custom transitions based on status text
        if (status.includes('Checking for updates')) {
          showIndeterminate();
        } else if (status.includes('Update available')) {
          showProgress(15);
        } else if (status.includes('Downloading')) {
          // Parse download progress if possible
          const match = status.match(/(\d+)%/);
          if (match) {
            showProgress(parseInt(match[1], 10));
          } else {
            showIndeterminate();
          }
        } else if (status.includes('Update downloaded')) {
          showProgress(100);
        } else if (status.includes('Launching')) {
          showProgress(100);
        }
      });
    }

    function showIndeterminate() {
      progressBar.style.width = '0%';
      progressLoading.style.display = 'block';
    }

    function showProgress(percentage) {
      progressLoading.style.display = 'none';
      progressBar.style.width = `${percentage}%`;
    }
  </script>
</body>
</html>
